spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:postgresql://localhost:5434/payment_db
    username: payment_user
    password: payment_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      bootstrap-servers: localhost:9092
      group-id: payment-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps JsonDeserializer so that a record with
      # missing type headers (produced with spring.json.add.type.headers=false)
      # does NOT crash the consumer thread in an infinite loop.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.deserializer.value.delegate.class: >
          org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: java.util.Map
      auto-offset-reset: earliest
    # ── Distributed Tracing via Micrometer Observation ────────────────────────
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

# ── JWT ── must match auth-service and gateway-service ───────────────────────
# Override with JWT_SECRET env-var in production / Docker.
jwt:
  secret: "${JWT_SECRET:order-processing-default-dev-secret-key-must-be-32chars}"

kafka:
  topics:
    order-placed: order-placed
    product-reserved: product-reserved
    product-reservation-failed: product-reservation-failed
    payment-initiated: payment-initiated
    payment-completed: payment-completed
    payment-failed: payment-failed
  
  # ── DefaultErrorHandler with FixedBackOff and DeadLetterPublishingRecoverer ─
  # Production-grade error handling for Kafka consumers.
  # When a @KafkaListener throws an exception:
  # 1. Consumer pauses and retries the message with fixed backoff delay
  # 2. After exhausting max-attempts, message is published to DLT
  #
  # Advantages:
  # - Simpler: No intermediate retry topics created (in-place retries)
  # - Direct: Explicit error handler configuration at bean level
  # - Performant: Doesn't generate extra topic messages during retries
  # - Flexible: Can selectively retry specific exception types
  # - Standard: Recommended Spring Kafka production pattern
  error-handler:
    enabled: true
    # Total number of attempts (1 original + 2 retries = 3 attempts)
    max-attempts: 3
    # Fixed delay between each retry attempt (milliseconds)
    # Example: 1000ms, then 2000ms, then 3000ms, etc.
    backoff-delay-ms: 1000

server:
  port: 8082
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always
      group:
        live:
          include: livenessState,ping
          show-details: never
        ready:
          include: readinessState,databaseHealth,kafkaHealth,diskSpace
          show-details: always
    info:
      enabled: true
    prometheus:
      enabled: true

  health:
    db:
      enabled: true
    kafka:
      enabled: true
    diskSpace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests:                  true
        # ── Custom business timer ──────────────────────────────────────────────
        payment_processing_duration_seconds:   true
      # SLO bucket boundaries for the payment processing timer
      slo:
        payment_processing_duration_seconds: 50ms,100ms,200ms,500ms,1s,2s,5s

  # ── Distributed Tracing ──────────────────────────────────────────────────
  tracing:
    sampling:
      probability: 1.0

  # ── Zipkin span exporter (Spring Boot 3.x / Micrometer Tracing) ──────────
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

info:
  app:
    name: ${spring.application.name}
    description: "Payment processing microservice — saga participant"
    version: "@project.version@"
  contact:
    team: "Platform Engineering"
    docs: "https://github.com/your-org/order-processing#readme"

logging:
  level:
    root: INFO
    com.order.processing: DEBUG
    # Ensure MetricsLogger [METRICS] lines are always visible at INFO
    com.order.processing.payment.metrics.MetricsLogger: INFO

# ── Metrics log export ────────────────────────────────────────────────────────
metrics:
  log:
    initial-delay-ms: 30000
    interval-ms: 60000