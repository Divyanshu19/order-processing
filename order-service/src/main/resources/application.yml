spring:
  application:
    name: order-service
  
  datasource:
    url: jdbc:postgresql://localhost:5435/order_db
    username: order_user
    password: order_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      bootstrap-servers: localhost:9092
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps JsonDeserializer so that a record with
      # missing type headers (produced with spring.json.add.type.headers=false)
      # does NOT crash the consumer thread in an infinite loop.  Instead the
      # failed record is forwarded to the DLT by the DefaultErrorHandler.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # The real deserializer that ErrorHandlingDeserializer delegates to
        spring.deserializer.value.delegate.class: >
          org.springframework.kafka.support.serializer.JsonDeserializer
        # Fallback type when the __TypeId__ header is absent (produced with
        # spring.json.add.type.headers=false).  Map<String,Object> is safe for
        # all event payloads this service produces.
        spring.json.value.default.type: java.util.Map
      auto-offset-reset: earliest
    # ── Distributed Tracing via Micrometer Observation ────────────────────────
    # Activates Spring Kafka 3's built-in KafkaTemplateObservation (producer) and
    # KafkaListenerObservation (consumer) so B3 headers are injected/extracted
    # automatically on every Kafka message, propagating the trace across services.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

# ── JWT ── must match auth-service and gateway-service ───────────────────────
# Override with JWT_SECRET env-var in production / Docker.
jwt:
  secret: "${JWT_SECRET:order-processing-default-dev-secret-key-must-be-32chars}"

kafka:
  topics:
    order-placed: order-placed
    product-reserved: product-reserved
    product-reservation-failed: product-reservation-failed
    payment-initiated: payment-initiated
    payment-completed: payment-completed
    payment-failed: payment-failed
  
  # ── DefaultErrorHandler with FixedBackOff and DeadLetterPublishingRecoverer ─
  # Production-grade error handling for Kafka consumers.
  # When a @KafkaListener throws an exception:
  # 1. Consumer pauses and retries the message with fixed backoff delay
  # 2. After exhausting max-attempts, message is published to DLT
  #
  # Advantages:
  # - Simpler: No intermediate retry topics created (in-place retries)
  # - Direct: Explicit error handler configuration at bean level
  # - Performant: Doesn't generate extra topic messages during retries
  # - Flexible: Can selectively retry specific exception types
  # - Standard: Recommended Spring Kafka production pattern
  error-handler:
    enabled: true
    # Total number of attempts (1 original + 2 retries = 3 attempts)
    max-attempts: 3
    # Fixed delay between each retry attempt (milliseconds)
    # Example: 1000ms, then 2000ms, then 3000ms, etc.
    backoff-delay-ms: 1000

server:
  port: 8080
  servlet:
    context-path: /api

product-service:
  # PRODUCT_SERVICE_BASE_URL is overridden to http://product-service:8081/api in Docker
  base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8081/api}

payment-service:
  # PAYMENT_SERVICE_BASE_URL is overridden to http://payment-service:8082/api in Docker
  base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8082/api}

logging:
  # Log levels — format and pattern are fully controlled by logback-spring.xml.
  # Do NOT define logging.pattern.console here; it would silently override
  # the LogstashEncoder appender and break structured JSON output.
  level:
    root: INFO
    com.order.processing: DEBUG
    # Show all CB + Retry log lines from our custom listener (including DEBUG success/ignored)
    com.order.processing.order.config.ResilienceEventLoggerConfig: DEBUG
    # Suppress Resilience4j's own internal verbose output — our listeners handle it
    io.github.resilience4j: WARN
    # Ensure MetricsLogger [METRICS] lines are always visible at INFO
    com.order.processing.order.metrics.MetricsLogger: INFO

# ── Metrics log export ────────────────────────────────────────────────────────
# Controls the MetricsLogger scheduled bean that writes metric snapshots to the
# application log.  Use these properties to tune frequency without redeploying.
metrics:
  log:
    # Delay before the first snapshot is emitted (ms). Default: 30 s.
    initial-delay-ms: 30000
    # Fixed delay between subsequent snapshots (ms). Default: 60 s.
    interval-ms: 60000

management:
  # ── Endpoint base path ───────────────────────────────────────────────────
  # Move all actuator endpoints from /actuator/** → /management/**
  # SecurityConfig already permits /management/** (updated below via /actuator/** wildcard,
  # and the gateway routes /management/** to each service).
  endpoints:
    web:
      base-path: /management
      exposure:
        # Expose the full management surface: health, info, metrics, prometheus,
        # plus Resilience4j CB/retry event streams for observability.
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,retryevents

  endpoint:
    health:
      # Show component-level detail (db, kafka, diskSpace, circuitBreakers) on every call.
      show-details: always
      # Named health groups for Kubernetes liveness / readiness probes:
      #   GET /management/health/live     → JVM-level liveness only (fast)
      #   GET /management/health/ready    → DB + Kafka + diskSpace (dependency check)
      group:
        live:
          include: livenessState,ping
          show-details: never
        ready:
          include: readinessState,databaseHealth,kafkaHealth,diskSpace
          show-details: always
    info:
      enabled: true
    prometheus:
      enabled: true

  health:
    db:
      enabled: true
    kafka:
      enabled: true
    diskSpace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    circuitbreakers:
      enabled: true

  # ── /management/info content ─────────────────────────────────────────────
  # Enable all built-in info contributors so /management/info is populated.
  # Additional custom fields come from info.* properties below.
  info:
    env:
      enabled: true        # exposes info.* properties from application.yml
    java:
      enabled: true        # JVM version, vendor, runtime
    os:
      enabled: true        # OS name, version, architecture
    build:
      enabled: true        # requires spring-boot-maven-plugin build-info goal

  # ── Prometheus ────────────────────────────────────────────────────────────
  # Attach a global "application" tag to EVERY metric exported by this service.
  # This lets Prometheus/Grafana queries filter by service name:
  #   orders_placed_total{application="order-service"}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Enable histogram buckets for all Timer metrics (enables histogram_quantile in PromQL)
      percentiles-histogram:
        http.server.requests:              true
        # ── Custom business timers ─────────────────────────────────────────────
        order_create_duration_seconds:     true
        saga_step_duration_seconds:        true
        http_orders_create_seconds:        true
        http_orders_get_seconds:           true
      # ── SLO buckets for order creation timer ─────────────────────────────────
      # Creates additional histogram buckets at these exact boundaries (seconds).
      # Enables SLO-based alerting: "% of orders created within 500 ms"
      slo:
        order_create_duration_seconds: 50ms,100ms,200ms,500ms,1s,2s,5s

  # ── Distributed Tracing ──────────────────────────────────────────────────
  # Sample every request (1.0 = 100%) — use a lower value (e.g. 0.1) in
  # high-throughput production environments to reduce Zipkin ingestion load.
  tracing:
    sampling:
      probability: 1.0

  # ── Zipkin span exporter (Spring Boot 3.x / Micrometer Tracing) ──────────
  # 'management.zipkin.tracing.endpoint' replaces the Spring Boot 2.x
  # 'spring.zipkin.base-url' property used by Spring Cloud Sleuth.
  # zipkin-reporter-brave POSTs completed spans to this URL in batches.
  # ZIPKIN_BASE_URL is overridden to http://zipkin:9411 in Docker Compose.
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

# ── /management/info static content ──────────────────────────────────────────
# These values are exposed by the 'env' InfoContributor when
# management.info.env.enabled=true. They appear as top-level keys in the
# JSON response of GET /management/info.
info:
  app:
    name: ${spring.application.name}
    description: "Order management microservice — saga orchestrator"
    version: "@project.version@"      # replaced by Maven resource filtering at build time
  contact:
    team: "Platform Engineering"
    docs: "https://github.com/your-org/order-processing#readme"

# ── Resilience4j Circuit Breaker Configuration ───────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      productService:
        # Sliding window: evaluate the last 10 calls to decide CB state
        sliding-window-size: 10
        # Open the circuit if ≥50% of calls in the window fail
        failure-rate-threshold: 50
        # Keep circuit OPEN for 10 s before allowing a probe call (HALF-OPEN)
        wait-duration-in-open-state: 10s
        # Allow 3 probe calls in HALF-OPEN; if they succeed → back to CLOSED
        permitted-number-of-calls-in-half-open-state: 3
        # Minimum calls before failure-rate is evaluated (avoids false trips on startup)
        minimum-number-of-calls: 5
        # Automatically move from OPEN → HALF-OPEN after waitDurationInOpenState
        automatic-transition-from-open-to-half-open-enabled: true
        # ProductNotFoundException is a 404 business error — NOT a downstream failure.
        # Rethrow it without counting it against the circuit breaker's failure rate.
        ignore-exceptions:
          - com.order.processing.order.exception.ProductNotFoundException
        # Expose circuit breaker state via /actuator/health
        register-health-indicator: true

  retry:
    instances:
      productService:
        # Total number of attempts (1 original + 2 retries)
        max-attempts: 3
        # Initial wait between attempts: 500 ms
        wait-duration: 500ms
        # Exponential backoff: attempt 1→500ms, attempt 2→1000ms, attempt 3→2000ms (capped)
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        # Hard cap so retries never exceed 2 s even if multiplier grows large
        exponential-max-wait-duration: 2s
        # Only retry on transient downstream failures — network errors, 5xx, timeouts.
        # ProductServiceException is thrown for all such cases in ProductServiceClient.
        retry-exceptions:
          - com.order.processing.order.exception.ProductServiceException
        # ProductNotFoundException is a definitive 404 — retrying will not help.
        ignore-exceptions:
          - com.order.processing.order.exception.ProductNotFoundException

