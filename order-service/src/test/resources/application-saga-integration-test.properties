# =============================================================================
# application-saga-integration-test.properties
#
# Activated by @ActiveProfiles("saga-integration-test") on every subclass of
# AbstractSagaIntegrationTest.
#
# Key differences from the main application.yml:
#   - PostgreSQL and Kafka connection strings are overridden at runtime by
#     AbstractSagaIntegrationTest.overrideContainerProperties() via
#     @DynamicPropertySource -- the values here are safe defaults that are
#     always overwritten before the context starts.
#   - Hibernate DDL is set to create-drop so each test class starts with a
#     clean schema.
#   - Kafka consumer auto-offset-reset is "earliest" so no events are missed
#     between container startup and listener registration.
#   - Zipkin / tracing exporter is disabled -- no Zipkin container in tests.
#   - Resilience4j circuit breaker wait duration is shortened so circuit-open
#     tests do not need to wait the production 60-second window.
#   - Product-service base URL is set to WireMock's loopback address; the
#     actual port is injected per-test by @DynamicPropertySource in subclasses
#     that need it.
# =============================================================================

# ── Datasource (overridden by @DynamicPropertySource at runtime) ─────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Kafka (bootstrap-servers overridden by @DynamicPropertySource) ───────────
spring.kafka.consumer.auto-offset-reset=earliest
# Shorten retry backoff so tests complete quickly
kafka.error-handler.backoff-delay-ms=100
kafka.error-handler.max-attempts=2

# ── JWT (test secret — same across all test classes) ─────────────────────────
jwt.secret=saga-test-secret-key-only-for-tests-must-be-32chars

# ── Tracing — disable Zipkin exporter (no Zipkin in test environment) ─────────
management.tracing.enabled=false
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ── Server ────────────────────────────────────────────────────────────────────
server.servlet.context-path=/api

# ── Resilience4j — shorten circuit breaker timings for fast tests ─────────────
# waitDurationInOpenState: 2s instead of the 60s production default.
# This matters for the circuit-breaker happy path test in OrderControllerTest.
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=2s
resilience4j.circuitbreaker.instances.productService.slidingWindowSize=4
resilience4j.circuitbreaker.instances.productService.minimumNumberOfCalls=2
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.order.processing=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.testcontainers=INFO
