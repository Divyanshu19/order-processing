# ── Integration-test profile ──────────────────────────────────────────────────
# Replaces PostgreSQL with H2 in-memory. No Docker / Testcontainers required.
# MockRestServiceServer intercepts RestTemplate calls to product-service and
# payment-service, so no real external services are needed either.

# ── Datasource: H2 in-memory (PostgreSQL compatibility mode) ─────────────────
spring.datasource.url=jdbc:h2:mem:order_db_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Kafka: disable entirely ───────────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.metrics.KafkaMetricsAutoConfiguration
management.health.kafka.enabled=false

# ── External service URLs (used by MockRestServiceServer) ────────────────────
product-service.base-url=http://product-service-mock/api
payment-service.base-url=http://payment-service-mock/api

# JWT - required so JwtAuthFilter initialises during integration tests
jwt.secret=test-secret-key-only-for-integration-tests-32chars

# ── Server ────────────────────────────────────────────────────────────────────
server.servlet.context-path=/api

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.order.processing=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
