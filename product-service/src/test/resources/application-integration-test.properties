# ?? Integration-test profile ????????????????????????????????????????????????
# Replaces the PostgreSQL datasource with H2 in-memory.
# No Docker / Testcontainers required.

# ?? Datasource: H2 in-memory with PostgreSQL compatibility mode ??????????????
spring.datasource.url=jdbc:h2:mem:product_db_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? JPA / Hibernate ??????????????????????????????????????????????????????????
# H2 auto-detected; no need to set dialect explicitly.
# Create schema from entities at context start, drop on close.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? Kafka: disable entirely ???????????????????????????????????????????????????
# KafkaAutoConfiguration wires KafkaTemplate + KafkaHealthIndicator which
# both try to connect to a broker on startup. Exclude the whole autoconfiguration.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.actuate.autoconfigure.metrics.KafkaMetricsAutoConfiguration
management.health.kafka.enabled=false

# ?? JWT — required so JwtAuthFilter initialises; @WithMockUser bypasses it ????
jwt.secret=test-secret-key-only-for-integration-tests-32chars

# ?? Server ????????????????????????????????????????????????????????????????????
server.servlet.context-path=/api

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.order.processing=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
