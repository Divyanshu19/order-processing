spring:
  application:
    name: gateway-service

  # ── Redis (required by RequestRateLimiter on the payment route) ─────────────
  # Host is overridden to 'redis' (the Compose service name) by
  # application-docker.yml when SPRING_PROFILES_ACTIVE=docker.
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      # ── Global defaults applied to every route ────────────────────────────
      default-filters:
        # Strip any existing X-Forwarded-For and replace with the real client IP
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - AddResponseHeader=X-Gateway, gateway-service

      # ── Route Definitions ─────────────────────────────────────────────────
      #
      # Convention used throughout this file:
      #
      #   Inbound path    →  Downstream URI
      #   /product/**     →  http://localhost:8081  (product-service)
      #   /order/**       →  http://localhost:8080  (order-service)
      #   /payment/**     →  http://localhost:8082  (payment-service)
      #
      # Each downstream service uses context-path /api, so the RewritePath
      # filter strips the route prefix and prepends /api/<resource-plural>.
      #
      # Examples:
      #   GET  :8079/product/42          →  GET  :8081/api/products/42
      #   POST :8079/order               →  POST :8080/api/orders
      #   GET  :8079/payment/history     →  GET  :8082/api/payments/history
      # ─────────────────────────────────────────────────────────────────────
      routes:

        # ── 0. Auth Service (public – no JWT required) ──────────────────────
        - id: auth-route
          uri: http://localhost:8090
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Gateway-Source, gateway-service
            - AddResponseHeader=X-Served-By, auth-service
          metadata:
            response-timeout: 5000
            connect-timeout: 2000

        # ── 1. Product Service ──────────────────────────────────────────────
        - id: product-route
          uri: http://localhost:8081
          predicates:
            - Path=/product/**
          filters:
            # Route /product/{id}, /product/{id}/stock, etc.
            - RewritePath=/product/(?<segment>.+), /api/products/${segment}
            # Route /product/ and /product (list-all).
            # MUST be anchored with ^ and $ — without anchors, replaceAll() finds
            # "/product" as a substring inside the already-rewritten "/api/products/1"
            # and corrupts it to "/api/api/productss/1".
            - RewritePath=^/product/?$, /api/products
            - AddRequestHeader=X-Gateway-Source, gateway-service
            - AddResponseHeader=X-Served-By, product-service
            # Retry on connection failures (idempotent methods only)
            - name: Retry
              args:
                retries: 3
                series: SERVER_ERROR
                methods: GET,HEAD
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false
          metadata:
            response-timeout: 5000        # ms – time to wait for downstream response
            connect-timeout: 2000         # ms – TCP connect timeout

        # ── 2. Order Service ────────────────────────────────────────────────
        - id: order-route
          uri: http://localhost:8080
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/(?<segment>.+), /api/orders/${segment}
            - RewritePath=^/order/?$, /api/orders
            - AddRequestHeader=X-Gateway-Source, gateway-service
            - AddResponseHeader=X-Served-By, order-service
            - name: Retry
              args:
                retries: 3
                series: SERVER_ERROR
                methods: GET,HEAD
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false
          metadata:
            response-timeout: 5000
            connect-timeout: 2000

        # ── 3. Payment Service ──────────────────────────────────────────────
        - id: payment-route
          uri: http://localhost:8082
          predicates:
            - Path=/payment/**
          filters:
            - RewritePath=/payment/(?<segment>.+), /api/payments/${segment}
            - RewritePath=^/payment/?$, /api/payments
            - AddRequestHeader=X-Gateway-Source, gateway-service
            - AddResponseHeader=X-Served-By, payment-service
            # Payment is NOT retried on error – avoid double-charging
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
          metadata:
            response-timeout: 10000       # payments may take longer
            connect-timeout: 2000

      # ── Global HTTP client settings ───────────────────────────────────────
      httpclient:
        connect-timeout: 2000           # ms
        response-timeout: 10s           # ISO-8601 duration

      # ── CORS global policy ────────────────────────────────────────────────
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"   # React / Next.js dev server
              - "http://localhost:4200"   # Angular dev server
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

# ── JWT ───────────────────────────────────────────────────────────────────────
# Must match the secret configured in auth-service.
# Override with JWT_SECRET env-var in production / Docker.
jwt:
  secret: "${JWT_SECRET:order-processing-default-dev-secret-key-must-be-32chars}"

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8079                            # Gateway listens here; well away from
                                        # existing services (8080 / 8081 / 8082)

# ── Actuator (/management/**) ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus,gateway

  endpoint:
    health:
      show-details: always
      group:
        live:
          include: livenessState,ping
          show-details: never
        ready:
          include: readinessState,diskSpace
          show-details: always
    info:
      enabled: true
    gateway:
      enabled: true                     # exposes /management/gateway/routes
    prometheus:
      enabled: true

  health:
    diskSpace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

  # ── Distributed Tracing ────────────────────────────────────────────────────
  # Sample every request. Lower this (e.g. 0.1) in high-volume production.
  tracing:
    sampling:
      probability: 1.0
  # ── Zipkin span exporter (Spring Boot 3.x / Micrometer Tracing) ────────────
  # 'management.zipkin.tracing.endpoint' is the correct Boot 3.x property.
  # The old 'spring.zipkin.base-url' (Spring Cloud Sleuth / Boot 2.x) is ignored here.
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

info:
  app:
    name: ${spring.application.name}
    description: "Spring Cloud Gateway — single entry-point, JWT enforcement, rate limiting"
    version: "@project.version@"
  contact:
    team: "Platform Engineering"
    docs: "https://github.com/your-org/order-processing#readme"

# ── Logging ───────────────────────────────────────────────────────────────────
# Log levels only — format/pattern is fully controlled by logback-spring.xml.
# Do NOT define logging.pattern.console here; it would override LogstashEncoder.
logging:
  level:
    root: INFO
    com.order.processing: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
